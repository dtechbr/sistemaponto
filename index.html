<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Integrado de Ponto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; 
            --success: #27ae60; 
            --danger: #c0392b; 
            --warning: #f39c12; 
            --info: #2980b9;
            --light: #f4f7f6; 
            --alert: #d35400;
            --purple: #8e44ad;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); padding: 20px; color: #333; margin: 0; }
        .header { text-align: center; margin-bottom: 30px; }
        .upload-area { border: 3px dashed var(--info); padding: 40px; text-align: center; border-radius: 12px; background: white; cursor: pointer; font-size: 1.2em; font-weight: bold; color: var(--info); transition: 0.3s; max-width: 600px; margin: 0 auto 20px auto; }
        .upload-area:hover { background: #eef2f7; }
        #status { text-align: center; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        
        .action-buttons { text-align: center; margin-bottom: 30px; }
        .btn-export { display: none; background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; transition: 0.3s; }
        .btn-export:hover { background: #219150; }

        .dashboard { display: flex; flex-direction: column; gap: 30px; max-width: 1300px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-title { margin-top: 0; color: var(--primary); font-size: 1.5em; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .stats-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 10px; text-align: center; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center;}
        .stat-box h4 { margin: 0 0 8px 0; font-size: 0.85em; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; }
        .stat-box .value { font-size: 1.8em; font-weight: bold; }
        
        .bg-positive { background: var(--success); }
        .bg-negative { background: var(--danger); }
        .bg-total { background: var(--info); }
        .bg-worked { background: #7f8c8d; }
        .bg-alert { background: var(--warning); color: #fff; }
        .bg-critical { background: var(--danger); color: #fff; }
        .bg-anterior { background: var(--purple); color: #fff; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; white-space: nowrap; }
        tr:hover { background-color: #fdfdfd; }
        
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; margin-right: 5px; display: inline-block; white-space: nowrap; margin-bottom: 4px; }
        .tag.impar { background: #fcf3cf; color: #d35400; border: 1px solid #f39c12; }
        .tag.incompleta { background: #f9ebea; color: #c0392b; border: 1px solid #e74c3c; }
        .tag.almoco { background: #fef9e7; color: #d35400; border: 1px solid #f39c12; }
        .tag.fds { background: #e8f8f5; color: #27ae60; border: 1px solid #2ecc71; }
        .tag.abono { background: #ebf5fb; color: #2980b9; border: 1px solid #3498db; }
        
        .btn-copy { background: #3498db; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; margin-top: 8px; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-copy:hover { background: #2980b9; }

        .text-success { color: var(--success); font-weight: bold; }
        .text-danger { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 Sistema Integrado de Ponto</h1>
        <p>Motor de extração aprimorado para layouts variáveis e cálculo exato de Banco de Horas.</p>
    </div>

    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
        📥 Arraste os arquivos PDF do Ponto aqui
        <input type="file" id="file-input" multiple accept=".pdf" style="display:none">
    </div>

    <div id="status"></div>

    <div class="action-buttons">
        <button id="btn-export" class="btn-export" onclick="exportToExcel()">Baixar Planilha Consolidada (Excel)</button>
    </div>

    <div class="dashboard" id="dashboard"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const status = document.getElementById('status');
        const dashboard = document.getElementById('dashboard');
        const btnExport = document.getElementById('btn-export');

        let globalExtractedData = [];

const termosAbono = [
    "feriado", "tiradentes", "pascoa", "santa", "atestado", "férias", "ferias", 
    "compensado", "d.s.r", "dsr", "afastamento", "doença", "acompanhante", 
    "dia do trabalho", "natal", "finados", "independência", "independencia", 
    "aparecida", "corpus christi", "carnaval", "proclamação", "proclamacao", "confraternização"
];
        fileInput.addEventListener('change', e => handleFiles(e.target.files));
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#eef2f7'; });
        dropZone.addEventListener('dragleave', e => { e.preventDefault(); dropZone.style.background = 'white'; });
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.background = 'white'; handleFiles(e.dataTransfer.files); });

        async function handleFiles(files) {
            if (files.length === 0) return;
            globalExtractedData = [];
            dashboard.innerHTML = "";
            btnExport.style.display = "none";
            status.innerHTML = "⏳ Lendo arquivos PDF e processando dados...";

            for (let file of files) {
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(buffer).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const res = await processPage(page);
                    globalExtractedData = globalExtractedData.concat(res);
                }
            }

            if(globalExtractedData.length > 0) {
                status.innerHTML = "✅ Extração concluída! Gerando análise...";
                setTimeout(() => {
                    analyzeData(globalExtractedData);
                    btnExport.style.display = "inline-block";
                    status.innerHTML = "";
                }, 500);
            } else {
                status.innerHTML = "❌ Falha: Nenhum dado capturado dos PDFs.";
            }
        }

        async function processPage(page) {
            const content = await page.getTextContent();
            const items = content.items;
            
            let rowsMap = {};
            let name = "Desconhecido";
            let saldoAnteriorStr = "0,00";
            let limitX = 380; 

            let fullText = items.map(i => i.str).join(" ");
            
            let nameMatch = fullText.match(/Nome:\s*(.*?)(?=\s+C\.C\.|\s+Turno|\s+CPF|\s+Departamento|\s+Categoria)/i);
            if (nameMatch) name = nameMatch[1].replace(/\|/g, '').trim();

            let bancoMatch = fullText.match(/Banco\s+de\s+Horas/i);
            if (bancoMatch) {
                let textoBanco = fullText.substring(bancoMatch.index);
                let numerosEncontrados = textoBanco.match(/-?\d+,\d{2}/g);
                if (numerosEncontrados && numerosEncontrados.length > 0) {
                    saldoAnteriorStr = numerosEncontrados[0];
                }
            }

            items.forEach(it => {
                let cleanStr = it.str.replace(/[\.\s]/g, '').toUpperCase();
                if (cleanStr.includes("HE") || cleanStr.includes("ΗΕ")) {
                    limitX = it.transform[4] - 15; 
                }
            });

            items.forEach(it => {
                if(!it.str.trim() || it.str === "|") return;
                let y = Math.round(it.transform[5]);
                let existingY = Object.keys(rowsMap).find(k => Math.abs(Number(k) - y) <= 4);
                if(existingY) y = existingY;
                if(!rowsMap[y]) rowsMap[y] = [];
                rowsMap[y].push(it);
            });

            const sortedY = Object.keys(rowsMap).sort((a,b) => b - a);
            let data = [];

            for (let y of sortedY) {
                let line = rowsMap[y].sort((a,b) => a.transform[4] - b.transform[4]);
                let first = line[0].str.trim();
                let fullLineText = line.map(i => i.str).join(" ");

                if (/^\d{2}\/\d{2}\/\d{4}/.test(first)) {
                    let row = { 
                        Colaborador: name, Data: first, Dia: line[1] ? line[1].str : "",
                        'Batida 1': "", 'Batida 2': "", 'Batida 3': "", 
                        'Batida 4': "", 'Batida 5': "", 'Batida 6': "", 
                        'HE/Débito': "", Obs: "", 'Saldo Anterior Original': saldoAnteriorStr
                    };

                    let punches = [];
                    let obsArr = [];

                    line.forEach(it => {
                        let x = it.transform[4];
                        let val = it.str.trim();
                        let timeMatch = val.match(/\d{2}:\d{2}/);

                        if (timeMatch) {
                            if (x < limitX) punches.push(timeMatch[0]);
                            else row['HE/Débito'] += timeMatch[0] + " ";
                        } else if (!/^\d{2}\/\d{2}/.test(val) && val !== row.Dia && x > limitX) {
                            obsArr.push(val);
                        }
                    });

                    if(punches[0]) row['Batida 1'] = punches[0];
                    if(punches[1]) row['Batida 2'] = punches[1];
                    if(punches[2]) row['Batida 3'] = punches[2];
                    if(punches[3]) row['Batida 4'] = punches[3];
                    if(punches[4]) row['Batida 5'] = punches[4];
                    if(punches[5]) row['Batida 6'] = punches[5];

                    if (punches.length === 0 && fullLineText.length > 20) {
                        let obsText = fullLineText.split(row.Dia)[1];
                        if (obsText) row.Obs = obsText.replace(/\|/g, '').trim();
                    } else {
                        row.Obs = obsArr.join(" ").replace(/\|/g, '').trim();
                    }
                    data.push(row);
                }
            }
            return data;
        }

        function timeToMins(timeStr) {
            if (!timeStr || !timeStr.includes(':')) return 0;
            let [h, m] = timeStr.split(':').map(Number);
            return (h * 60) + m;
        }

        // NOVA FUNÇÃO: Interpreta HH,MM exatamente como Horas e Minutos Reais (Ex: 6,40 = 6h e 40m)
        function stringToMins(timeStr) {
            if (!timeStr) return 0;
            let isNegative = timeStr.trim().startsWith('-');
            let cleanStr = timeStr.replace('-', '').trim();
            let parts = cleanStr.split(',');
            let h = parts[0] ? parseInt(parts[0], 10) : 0;
            let m = parts[1] ? parseInt(parts[1], 10) : 0;
            let totalMins = (h * 60) + m;
            return isNegative ? -totalMins : totalMins;
        }

        function formatMins(mins, showPlus = false) {
            if (mins === 0) return "00:00";
            let sign = mins < 0 ? "-" : (showPlus ? "+" : "");
            let absMins = Math.abs(mins);
            let h = Math.floor(absMins / 60);
            let m = absMins % 60;
            return `${sign}${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function copiarMensagem(btn) {
            const msg = btn.getAttribute('data-msg');
            navigator.clipboard.writeText(msg).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = "✅ Copiado!";
                btn.style.background = "#27ae60";
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = "#3498db";
                }, 2000);
            });
        }

        function analyzeData(rows) {
            let colaboradores = {};

            rows.forEach(row => {
                let nome = row['Colaborador'] || 'Desconhecido';
                if (!colaboradores[nome]) {
                    colaboradores[nome] = { 
                        nome: nome, dias: [], totalMinsTrab: 0, horasPositivas: 0, 
                        horasNegativas: 0, qtdBatidaImpar: 0, qtdAlmocoCurto: 0, 
                        qtdJornadaIncompleta: 0, saldoAnteriorMins: 0, hasCapturedSaldo: false
                    };
                }

                if (!colaboradores[nome].hasCapturedSaldo && row['Saldo Anterior Original'] && row['Saldo Anterior Original'] !== "0,00" && row['Saldo Anterior Original'] !== "00:00") {
                    colaboradores[nome].saldoAnteriorMins = stringToMins(row['Saldo Anterior Original']);
                    colaboradores[nome].hasCapturedSaldo = true;
                }

                let batidas = [];
                for (let i = 1; i <= 6; i++) {
                    if (row[`Batida ${i}`] && row[`Batida ${i}`].includes(":")) {
                        batidas.push(row[`Batida ${i}`].trim());
                    }
                }

              let minsTrabalhados = 0;
                let anomalias = [];
                let obsTexto = (row['Obs'] || "").toLowerCase();
                
                // NOVO: Verificação de Data (Até Ontem)
                let [diaStr, mesStr, anoStr] = (row['Data'] || "").split('/');
                let dataLinha = new Date(anoStr, mesStr - 1, diaStr);
                let dataHoje = new Date();
                dataHoje.setHours(0, 0, 0, 0); // Zera as horas para comparar apenas a data
                
                // Verifica se a data da linha é hoje ou algum dia no futuro
                let isHojeOuFuturo = dataLinha >= dataHoje;

                let isImpar = batidas.length % 2 !== 0;
                let isIncompleta = batidas.length > 0 && batidas.length < 4;
                let justificado = termosAbono.some(termo => obsTexto.includes(termo));

                // Se o dia for hoje ou futuro, ignora anomalias pois o dia ainda não acabou
                if (isHojeOuFuturo) {
                    isImpar = false;
                    isIncompleta = false;
                }

                if (isImpar) {
                    anomalias.push('<span class="tag impar">⚠️ Batida Ímpar</span>');
                    colaboradores[nome].qtdBatidaImpar++;
                }

                if (isIncompleta && !justificado) {
                    anomalias.push('<span class="tag incompleta">⚠️ Jornada Incompleta</span>');
                    colaboradores[nome].qtdJornadaIncompleta++;
                }

                for (let i = 0; i < batidas.length - 1; i += 2) {
                    minsTrabalhados += (timeToMins(batidas[i+1]) - timeToMins(batidas[i]));
                }

                if (batidas.length >= 4) {
                    let almoco = timeToMins(batidas[2]) - timeToMins(batidas[1]);
                    if (almoco < 60 && almoco > 0) {
                        anomalias.push('<span class="tag almoco">🍔 Almoço < 1h</span>');
                        colaboradores[nome].qtdAlmocoCurto++;
                    }
                }

                let diaTexto = (row['Dia'] || "").toLowerCase();
                let isFDS = diaTexto.includes("sabado") || diaTexto.includes("domingo");
                
                // NOVO: Se for hoje ou futuro, zera a expectativa de horas trabalhadas (não desconta 8h)
                let minsEsperados = (isFDS || isHojeOuFuturo) ? 0 : 480; 
                let saldoDia = minsTrabalhados - minsEsperados;
                
                if (isFDS && minsTrabalhados > 0) {
                    anomalias.push('<span class="tag fds">🚀 Hora Extra FDS</span>');
                    saldoDia = minsTrabalhados;
                }

                if (saldoDia < 0) {
                    if (justificado) {
                        saldoDia = 0; 
                        anomalias.push('<span class="tag abono">✅ Falta Abonada</span>');
                    }
                }

                if (saldoDia > 0) {
                    colaboradores[nome].horasPositivas += saldoDia;
                } else if (saldoDia < 0) {
                    colaboradores[nome].horasNegativas += Math.abs(saldoDia);
                }

                colaboradores[nome].dias.push({
                    data: row['Data'], dia: row['Dia'], batidasStr: batidas.join(" | "),
                    trabalhado: minsTrabalhados, saldo: saldoDia, obs: row['Obs'] || "", 
                    anomalias: anomalias.join(""), isImpar: isImpar, isIncompleta: (isIncompleta && !justificado)
                });

                colaboradores[nome].totalMinsTrab += minsTrabalhados;
            });

            renderDashboard(colaboradores);
        }

        function renderDashboard(colaboradores) {
            dashboard.innerHTML = "";
            
            for (let key in colaboradores) {
                let colab = colaboradores[key];
                
                let saldoMesMins = colab.horasPositivas - colab.horasNegativas;
                let saldoFinal = colab.saldoAnteriorMins + saldoMesMins;
                
                let card = document.createElement('div');
                card.className = 'card';
                
                let corSaldoFinal = 'bg-total';
                if (saldoFinal > 0) corSaldoFinal = 'bg-positive';
                if (saldoFinal < 0) corSaldoFinal = 'bg-negative';

                let html = `
                    <h2 class="card-title">👤 ${colab.nome}</h2>
                    <div class="stats-board">
                        <div class="stat-box bg-anterior" title="Trazido do espelho do mês passado">
                            <h4>Saldo Anterior</h4>
                            <div class="value">${formatMins(colab.saldoAnteriorMins, true)}</div>
                        </div>
                        <div class="stat-box bg-positive" title="Créditos gerados neste mês">
                            <h4>Crédito (Mês)</h4>
                            <div class="value">${formatMins(colab.horasPositivas, true)}</div>
                        </div>
                        <div class="stat-box bg-negative" title="Débitos gerados neste mês">
                            <h4>Débito (Mês)</h4>
                            <div class="value">${formatMins(colab.horasNegativas * -1)}</div>
                        </div>
                        <div class="stat-box ${corSaldoFinal}" title="Soma total do banco do colaborador">
                            <h4>Saldo Atual (Total)</h4>
                            <div class="value">${formatMins(saldoFinal, true)}</div>
                        </div>
                        
                        <div class="stat-box bg-alert"><h4>⚠️ Batidas Ímpares</h4><div class="value">${colab.qtdBatidaImpar}</div></div>
                        <div class="stat-box bg-critical"><h4>⚠️ Jornada Incompleta</h4><div class="value">${colab.qtdJornadaIncompleta}</div></div>
                        <div class="stat-box bg-alert"><h4>🍔 Almoço Curto</h4><div class="value">${colab.qtdAlmocoCurto}</div></div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>Data</th><th>Dia</th><th>Marcações</th><th>Trabalhado</th><th>Saldo Diário</th><th>Inconsistências / Status</th><th>Observação Original</th></tr>
                            </thead>
                            <tbody>
                `;

                colab.dias.forEach(d => {
                    let saldoClass = d.saldo > 0 ? 'text-success' : (d.saldo < 0 ? 'text-danger' : '');
                    let sinal = d.saldo > 0 ? "+" : "";
                    
                    let linhaStyle = (d.isImpar || d.isIncompleta) ? 'background-color: #fdf2e9;' : '';
                    
                    let btnCopiar = '';
                    if (d.isImpar || d.isIncompleta) {
                        let motivos = [];
                        if (d.isImpar) motivos.push("uma marcação ímpar");
                        if (d.isIncompleta) motivos.push("uma jornada incompleta");
                        
                        let txtMotivo = motivos.join(" e ");
                        let msgTexto = `Olá ${colab.nome}, tudo bem? Verificando o espelho de ponto, notei ${txtMotivo} no registro do dia ${d.data} (${d.dia}). As batidas que constam no sistema são: [ ${d.batidasStr} ]. Por favor, peço que acesse o sistema para realizar a correção ou justificar esse dia. Qualquer dúvida, estou à disposição.`;
                        
                        btnCopiar = `<br><button class="btn-copy" data-msg="${msgTexto}" onclick="copiarMensagem(this)">📋 Copiar Aviso</button>`;
                    }

                    html += `<tr style="${linhaStyle}">
                        <td>${d.data || '-'}</td>
                        <td>${d.dia || '-'}</td>
                        <td><b>${d.batidasStr || '-'}</b></td>
                        <td>${formatMins(d.trabalhado)}</td>
                        <td class="${saldoClass}">${sinal}${formatMins(d.saldo)}</td>
                        <td>${d.anomalias || '-'}${btnCopiar}</td>
                        <td><small>${d.obs}</small></td>
                    </tr>`;
                });

                html += `</tbody></table></div>`;
                card.innerHTML = html;
                dashboard.appendChild(card);
            }
        }

        function exportToExcel() {
            if (globalExtractedData.length === 0) return;
            let exportData = globalExtractedData.map(({ 'Saldo Anterior Original': _, ...rest }) => rest);
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ponto Consolidado");
            XLSX.writeFile(wb, "Ponto_Integrado.xlsx");
        }
    </script>
</body>
</html>
